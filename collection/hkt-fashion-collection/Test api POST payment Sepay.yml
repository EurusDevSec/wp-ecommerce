info:
  name: Test api POST payment Sepay
  type: http
  seq: 1

http:
  method: post
  url: {{baseUrl}}/wp-json/sepay/v1/webhook
  headers:
    - name: Authorization
      value: {{sepayKey}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "gateway": "Vietcombank",
        "transferType": "in",
        "transferAmount": 519000,
        "content": "HKTFASHION2062",
        "code": "FTLOCAL123"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
